<div class="container page-content">
     <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
        <h1 class="text-3xl font-bold text-center mb-2" style="color: var(--cor-primaria);">Planejamento de Atividade</h1>
         <div class="flex justify-center mb-6">
            <div class="w-full max-w-xs">
                <label for="control-date" class="block text-sm font-medium text-gray-700 text-center">Data de Controle</label>
                <input type="date" id="control-date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2">
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-7 gap-4 items-end mb-6">
            <div class="md:col-span-2">
                <label for="task-name" class="block text-sm font-medium text-gray-700">Nome da Tarefa</label>
                <input type="text" id="task-name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2">
            </div>
            <div>
                <label for="start-date" class="block text-sm font-medium text-gray-700">Início</label>
                <input type="date" id="start-date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2">
            </div>
            <div>
                <label for="task-duration" class="block text-sm font-medium text-gray-700">Duração (dias)</label>
                <input type="number" id="task-duration" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2" min="0">
            </div>
             <div class="flex items-end gap-2">
                <div class="flex-grow">
                    <label for="task-dependency" class="block text-sm font-medium text-gray-700">Predecessora (ID)</label>
                    <input type="text" id="task-dependency" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2">
                </div>
                <div>
                    <label for="task-dependency-type" class="block text-sm font-medium text-gray-700">Tipo</label>
                    <select id="task-dependency-type" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2">
                        <option>TI</option>
                        <option>TT</option>
                        <option>II</option>
                        <option>IT</option>
                    </select>
                </div>
            </div>
            <div>
                <label for="task-cost" class="block text-sm font-medium text-gray-700">Custo (R$)</label>
                <input type="number" id="task-cost" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2" min="0" step="0.01">
            </div>
             <div>
                <label for="task-progress" class="block text-sm font-medium text-gray-700">Avanço Real (%)</label>
                <input type="number" id="task-progress" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2" min="0" max="100">
            </div>
        </div>
         <div class="flex justify-end mb-6">
            <button id="add-task-btn" class="inline-flex items-center justify-center rounded-md border border-transparent px-4 py-2 text-sm font-medium text-white shadow-sm" style="background-color: var(--cor-primaria);">Adicionar Tarefa</button>
            <button id="edit-task-btn" class="inline-flex items-center justify-center rounded-md border border-transparent px-4 py-2 text-sm font-medium text-white shadow-sm ml-2" style="background-color: #FFA500; display: none;">Salvar Edição</button>
        </div>
        <h2 class="text-xl font-semibold mb-3" style="color: var(--cor-primaria);">Lista de Atividades</h2>
        <div class="overflow-x-auto rounded-lg border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nome da Tarefa</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Início</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Término</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Duração (dias)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Predecessora</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Custo (R$)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Avanço Planejado (%)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Avanço Real (%)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                    </tr>
                </thead>
                <tbody id="task-table-body" class="bg-white divide-y divide-gray-200"></tbody>
            </table>
        </div>
        <div class="flex items-center justify-end gap-4 mt-6">
            <button id="clear-btn" class="inline-flex items-center justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm">Limpar</button>
        </div>
    </div>
    <div class="bg-white rounded-lg shadow-lg p-6">
        <h2 class="text-xl font-semibold mb-4 text-center" style="color: var(--cor-primaria);">Gráfico de Gantt</h2>
        <div id="gantt-container"></div>
    </div>
</div>
