<div id="descricao-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">Editar Descrição</div>
        <div class="modal-body">
            <textarea id="modal-descricao-input" placeholder="Digite a descrição completa..."></textarea>
        </div>
        <div class="modal-footer">
            <button id="modal-cancel-btn" class="btn-cancel px-4 py-2 rounded text-sm">Cancelar</button>

        </div>
    </div>
</div>
